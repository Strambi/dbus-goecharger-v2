[DEFAULT]
# Log level: CRITICAL, ERROR, WARNING, INFO, DEBUG
Logging = ERROR

# Shared defaults – can be overridden per charger section below
HardwareVersion = 4
AcPosition = 0
PauseBetweenRequests = 5000
SignOfLifeLog = 1

# -----------------------------------------------------------------------
# One [CHARGERx] section per physical charger.
# Required per section: Host, Deviceinstance (must be unique), CustomName
# All DEFAULT values above can be overridden per section.
# -----------------------------------------------------------------------

[CHARGER1]
Host = 192.168.0.151
Deviceinstance = 43
CustomName = Wallbox
# D-Bus service for grid power (enables pgrid push to charger for PV surplus mode).
# Find the exact name on Venus OS with: dbus-spy or "dbus -y com.victronenergy.grid TAB"
# Common values: com.victronenergy.grid  or  com.victronenergy.system
# GridPath defaults to /Ac/Power; for com.victronenergy.system use /Ac/Grid/Power
GridService = com.victronenergy.grid
GridPath = /Ac/Power
