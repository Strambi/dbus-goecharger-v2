# AC-Position: 0 = AC out, 1 = AC in
AcPosition = 0

# Log level: CRITICAL, ERROR, WARNING, INFO, DEBUG
Logging = ERROR

[ONPREMISE]
Host = 192.168.178.51
# Polling interval in ms (minimum 21ms, recommended >= 1000ms)
PauseBetweenRequests = 5000
