[DEFAULT]
# Log level: CRITICAL, ERROR, WARNING, INFO, DEBUG
Logging = ERROR

# Shared defaults – can be overridden per charger section below
HardwareVersion = 4
AcPosition = 0
PauseBetweenRequests = 5000
SignOfLifeLog = 1

# -----------------------------------------------------------------------
# One [CHARGERx] section per physical charger.
# Required per section: Host, Deviceinstance (must be unique), CustomName
# All DEFAULT values above can be overridden per section.
# -----------------------------------------------------------------------

[CHARGER1]
Host = 192.168.0.151
Deviceinstance = 43
CustomName = Wallbox Garage
# D-Bus service for grid power (enables pGrid push to charger for PV surplus mode).
# The service name contains the serial number of your energy meter and is unique per device.
# To find the exact name: SSH into Venus OS and run:
#   dbus -y | grep victronenergy.grid
# Then copy the full result (e.g. com.victronenergy.grid.ve_HQ2423Z2CZ7) as GridService below.
# GridPath defaults to /Ac/Power (total grid power in W, negative = export/surplus).
GridService = com.victronenergy.grid.ve_HQ2423Z2CZ7
GridPath = /Ac/Power

[CHARGER2]
Host = 192.168.0.137
Deviceinstance = 44
CustomName = Wallbox Flex
